# CSA AI Security Landscape — source of truth
# This is the single source of truth for all landscape data.
# All edits go through PR review. The agent writes proposals to agent/proposals/,
# not directly here. Human review is required before merging any agent proposal.
#
# NOTE: csa_member flags in this seed dataset are unverified sample data.
# All csa_member values must be confirmed against the CSA member roster
# before this data is used in production.

categories:

  # ── Security for AI ──────────────────────────────────────────────────────────
  # Capabilities that protect AI systems from attack, manipulation, and abuse.

  - id: model-security
    name: Model Security & Integrity
    area: security-for-ai
    description: >-
      Protecting ML models from adversarial attacks, theft, backdoors,
      and unauthorized modification throughout the model lifecycle.

  - id: prompt-defense
    name: Prompt Injection & Jailbreak Defense
    area: security-for-ai
    description: >-
      Detecting and blocking prompt injection, jailbreaks, and adversarial
      inputs before they reach or exit the language model.

  - id: agent-security
    name: Agentic Workflow Security
    area: security-for-ai
    description: >-
      Governance, access control, and threat detection for AI agents,
      copilots, and non-human identities operating autonomously.

  - id: ai-supply-chain
    name: AI Supply Chain Security
    area: security-for-ai
    description: >-
      Securing the AI development pipeline including third-party models,
      datasets, dependencies, and model provenance.

  - id: rag-data-security
    name: RAG & Data Pipeline Security
    area: security-for-ai
    description: >-
      Protecting retrieval-augmented generation pipelines, vector stores,
      and training data from poisoning, leakage, and exfiltration.

  - id: ai-red-teaming
    name: AI Red Teaming & Evaluation
    area: security-for-ai
    description: >-
      Systematic adversarial testing of AI systems to discover security
      vulnerabilities, safety failures, and capability limits before deployment.

  # ── AI for Security ──────────────────────────────────────────────────────────
  # Capabilities that use AI to power security operations.

  - id: ai-soc
    name: AI-Augmented SOC & Detection
    area: ai-for-security
    description: >-
      AI-powered threat detection, investigation, and response platforms
      that augment or automate security operations center workflows.

  - id: ai-threat-intel
    name: AI Threat Intelligence
    area: ai-for-security
    description: >-
      AI systems that collect, correlate, and operationalize threat
      intelligence from open, dark, and technical sources.

  - id: ai-vuln-management
    name: AI-Driven Vulnerability Management
    area: ai-for-security
    description: >-
      AI-based platforms for discovering, prioritizing, and remediating
      vulnerabilities by actual risk rather than CVSS score alone.

  - id: ai-identity
    name: AI-Powered Identity & Access
    area: ai-for-security
    description: >-
      AI-driven identity threat detection, access governance, and
      non-human identity management for enterprise environments.

  # ── AI Governance, Observability & Risk ──────────────────────────────────────
  # Capabilities providing visibility, control, and accountability over AI.

  - id: ai-observability
    name: AI Observability & Monitoring
    area: ai-governance-risk
    description: >-
      Monitoring model performance, drift, and behavior in production;
      LLM tracing, evaluation, and output quality measurement.

  - id: ai-governance
    name: AI Governance Platforms
    area: ai-governance-risk
    description: >-
      Platforms for implementing AI policy, risk registers, audit trails,
      model inventories, and responsible AI lifecycle management.

  - id: ai-risk-compliance
    name: AI Risk & Compliance
    area: ai-governance-risk
    description: >-
      Tools for AI risk assessment, regulatory compliance (EU AI Act,
      NIST AI RMF, ISO 42001), and third-party AI vendor management.


