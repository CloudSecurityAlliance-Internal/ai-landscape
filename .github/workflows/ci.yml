name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r agent/requirements.txt
      - run: cd agent && pytest tests/ -v
      - run: python agent/validate.py data/landscape.yaml
